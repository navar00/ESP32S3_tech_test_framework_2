name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Stub Config.h (CI uses dummy credentials)
        run: |
          if [ ! -f src/core/Config.h ]; then
            cp src/core/Config_Template.h src/core/Config.h 2>/dev/null || \
              echo "// stubbed in CI" > src/core/Config.h
          fi

      - name: Build firmware
        run: pio run -e esp32-s3-devkitc-1

      - name: Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            .pio/build/esp32-s3-devkitc-1/firmware.bin
            .pio/build/esp32-s3-devkitc-1/firmware.elf
          retention-days: 14

  test:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Run native tests
        run: pio test -e native -v

  check:
    name: Static analysis (cppcheck)
    runs-on: ubuntu-latest
    continue-on-error: true   # informativo, no bloqueante
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Stub Config.h
        run: |
          if [ ! -f src/core/Config.h ]; then
            cp src/core/Config_Template.h src/core/Config.h 2>/dev/null || \
              echo "// stubbed in CI" > src/core/Config.h
          fi

      - name: Run cppcheck
        run: pio check -e check --fail-on-defect=high
